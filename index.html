<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 閱讀</title>
<style>
@font-face {
  font-family: 'LINE Seed TW';
  src: url('字型/LINESeedTW_TTF_Th.ttf') format('truetype');
  font-weight: 300;
  font-display: swap;
}
@font-face {
  font-family: 'LINE Seed TW';
  src: url('字型/LINESeedTW_TTF_Rg.ttf') format('truetype');
  font-weight: 400;
  font-display: swap;
}
@font-face {
  font-family: 'LINE Seed TW';
  src: url('字型/LINESeedTW_TTF_Bd.ttf') format('truetype');
  font-weight: 700;
  font-display: swap;
}
@font-face {
  font-family: 'LINE Seed TW';
  src: url('字型/LINESeedTW_TTF_Eb.ttf') format('truetype');
  font-weight: 800;
  font-display: swap;
}
</style>
<!-- Firebase SDKs (compat mode, works without bundler) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
/* ===== DESIGN TOKENS (手繪塗鴉) ===== */
:root {
  --hd-paper: #fbf6ee;
  --hd-paper-grid: rgba(45, 42, 38, 0.06);
  --hd-ink: #2d2a26;
  --hd-pencil: #5a564d;
  --hd-red: #e84a3a;
  --hd-yellow: #f7c84b;
  --hd-blue: #4a86e0;
  --hd-green: #4fb585;
  --hd-pink: #e8779e;
  --hd-highlighter: rgba(247, 200, 75, 0.5);
  --radius-rough: 24px 18px 22px 16px / 16px 22px 18px 24px;
  --font-display: 'LINE Seed TW', 'PingFang TC', 'Noto Sans TC', sans-serif;
  --font-body: 'LINE Seed TW', 'PingFang TC', 'Noto Sans TC', sans-serif;
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  color: var(--hd-ink);
  background-color: var(--hd-paper);
  background-image:
    linear-gradient(var(--hd-paper-grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--hd-paper-grid) 1px, transparent 1px);
  background-size: 20px 20px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* coffee stain decoration */
body::before {
  content: '';
  position: fixed;
  width: 280px; height: 220px;
  top: 30%; right: 4%;
  background: radial-gradient(ellipse, rgba(120, 80, 50, 0.07) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  width: 160px; height: 130px;
  bottom: 15%; left: 6%;
  background: radial-gradient(ellipse, rgba(120, 80, 50, 0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ===== LAYOUT ===== */
.container {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 16px;
  position: relative;
  z-index: 1;
  min-width: 0;
}

/* ===== HEADER ===== */
.app-header {
  padding: 28px 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.app-title {
  font-family: var(--font-display);
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 700;
  color: var(--hd-ink);
  letter-spacing: -0.02em;
  transform: rotate(-1deg);
  display: inline-block;
  line-height: 1.1;
}

.app-title span {
  background: linear-gradient(180deg, transparent 55%, var(--hd-highlighter) 55%);
  padding: 0 4px;
}

.title-deco {
  font-family: var(--font-display);
  font-size: clamp(13px, 2vw, 16px);
  color: var(--hd-pencil);
  transform: rotate(1deg);
  display: inline-block;
  margin-top: 4px;
  font-style: italic;
}

.settings-btn {
  background: none;
  border: 2.5px solid var(--hd-ink);
  border-radius: 50% 45% 55% 42% / 45% 55% 42% 55%;
  width: 44px; height: 44px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s;
  flex-shrink: 0;
  box-shadow: 3px 3px 0 var(--hd-ink);
}
.settings-btn:hover { transform: rotate(20deg); }
.settings-btn svg { width: 22px; height: 22px; }

/* ===== INPUT AREA ===== */
.input-section {
  margin: 16px 0 32px;
}

.input-label {
  font-family: var(--font-display);
  font-size: 15px;
  color: var(--hd-pencil);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  transform: rotate(-0.5deg);
}

.input-row {
  display: flex;
  gap: 10px;
  align-items: stretch;
}

.url-input {
  flex: 1;
  padding: 14px 18px;
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--hd-ink);
  background: white;
  border: 2.5px solid var(--hd-ink);
  border-radius: 18px 14px 16px 20px / 14px 18px 20px 16px;
  outline: none;
  box-shadow: 3px 3px 0 rgba(45,42,38,0.15);
  transition: box-shadow 0.15s;
}
.url-input:focus {
  box-shadow: 4px 4px 0 var(--hd-blue);
  border-color: var(--hd-blue);
}
.url-input::placeholder { color: #aaa8a2; }

@media (max-width: 639px) {
  .input-row { flex-direction: column; align-items: center; }
  .url-input { width: 100%; }
}

.btn-hand {
  background: var(--hd-red);
  color: var(--hd-paper);
  border: none;
  padding: 14px 22px;
  border-radius: var(--radius-rough);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 15px;
  transform: rotate(-1deg);
  box-shadow: 4px 4px 0 var(--hd-ink);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-hand:hover:not(:disabled) {
  transform: rotate(-2deg) translateY(-2px);
  box-shadow: 6px 6px 0 var(--hd-ink);
}
.btn-hand:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: rotate(-1deg);
}

/* ===== LOADING STATE ===== */
.loading-bar {
  display: none;
  align-items: center;
  gap: 12px;
  margin: 12px 0;
  padding: 14px 20px;
  background: var(--hd-yellow);
  border-radius: var(--radius-rough);
  border: 2px dashed var(--hd-ink);
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--hd-ink);
  transform: rotate(-0.5deg);
}
.loading-bar.visible { display: flex; }

.spinner {
  width: 24px; height: 24px;
  border: 3px solid var(--hd-ink);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== ERROR MESSAGE ===== */
.error-note {
  display: none;
  margin: 10px 0;
  padding: 14px 18px;
  background: #fde8e6;
  border: 2px solid var(--hd-red);
  border-radius: var(--radius-rough);
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--hd-red);
  transform: rotate(0.5deg);
  position: relative;
}
.error-note.visible { display: block; }
.error-close {
  position: absolute;
  top: 8px; right: 12px;
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: var(--hd-red);
  line-height: 1;
}

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
}
.empty-doodle {
  font-size: 64px;
  display: block;
  margin-bottom: 16px;
  opacity: 0.4;
  transform: rotate(-3deg);
  display: inline-block;
}
.empty-text {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--hd-pencil);
  transform: rotate(1deg);
  display: inline-block;
}

/* ===== CARDS GRID ===== */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  padding-bottom: 48px;
}

@media (max-width: 1023px) {
  .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
}
@media (max-width: 639px) {
  .cards-grid { grid-template-columns: 1fr; gap: 14px; }
  /* horizontal compact card on mobile */
  .card { display: grid; grid-template-columns: 96px 1fr; }
  .card::before { left: 48px; } /* tape on thumb section */
  .card-thumb {
    width: 96px;
    height: 100%;
    aspect-ratio: unset;
    object-fit: cover;
    border-bottom: none;
    border-right: 2px solid rgba(45,42,38,0.1);
  }
  .card-thumb-placeholder {
    width: 96px;
    height: 100%;
    min-height: 80px;
    aspect-ratio: unset;
    border-bottom: none;
    border-right: 2px solid rgba(45,42,38,0.1);
    font-size: 28px;
  }
  .card-body { padding: 10px 12px 30px; }
  .card-title { font-size: 13px; -webkit-line-clamp: 2; line-clamp: 2; margin-bottom: 6px; }
  .card-meta { font-size: 11px; }
  .card-delete { bottom: 6px; right: 6px; }
}

/* ===== CARD ===== */
.card {
  border-radius: var(--radius-rough);
  padding: 0;
  box-shadow: 5px 5px 0 rgba(45,42,38,0.18);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  overflow: hidden;
  position: relative;
}
.card:hover {
  transform: translateY(-4px) rotate(0deg) !important;
  box-shadow: 8px 8px 0 rgba(45,42,38,0.22);
}

.card.color-yellow { background: var(--hd-yellow); transform: rotate(-1.4deg); }
.card.color-pink   { background: var(--hd-pink);   transform: rotate(1.2deg);  color: white; }
.card.color-blue   { background: #c8d9f8;           transform: rotate(-0.8deg); }
.card.color-green  { background: #b8ead4;           transform: rotate(1.6deg);  }

/* tape strip */
.card::before {
  content: '';
  position: absolute;
  top: -9px;
  left: 50%;
  transform: translateX(-50%) rotate(-3deg);
  width: 56px; height: 16px;
  background: rgba(255,255,255,0.45);
  border: 1px solid rgba(255,255,255,0.7);
  border-radius: 2px;
  z-index: 1;
}

.card-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  display: block;
  border-bottom: 2px solid rgba(45,42,38,0.1);
}
.card-thumb-placeholder {
  width: 100%;
  aspect-ratio: 16/9;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  opacity: 0.5;
  border-bottom: 2px solid rgba(45,42,38,0.1);
  background: rgba(255,255,255,0.3);
}

.card-body {
  padding: 14px 16px 16px;
}

.card-type-badge {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--hd-ink);
  opacity: 0.6;
  margin-bottom: 4px;
}

.card-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--hd-ink);
  line-height: 1.35;
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 12px;
  color: var(--hd-pencil);
  font-family: var(--font-body);
}

.card-pages-badge {
  background: rgba(255,255,255,0.5);
  border: 1.5px solid rgba(45,42,38,0.2);
  border-radius: 20px;
  padding: 2px 8px;
  font-size: 11px;
  font-family: var(--font-display);
  white-space: nowrap;
}

.card-delete {
  position: absolute;
  bottom: 10px; right: 10px;
  width: 26px; height: 26px;
  background: rgba(255,255,255,0.6);
  border: 1.5px solid rgba(45,42,38,0.25);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 2;
}
.card:hover .card-delete { opacity: 1; }
.card-delete:hover { background: #fde8e6; border-color: var(--hd-red); }

/* ===== SETTINGS MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(45,42,38,0.45);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  display: none;
}
.modal-overlay.visible { display: flex; }

.modal-box {
  background: var(--hd-paper);
  border: 2.5px solid var(--hd-ink);
  border-radius: var(--radius-rough);
  box-shadow: 8px 8px 0 var(--hd-ink);
  padding: 32px;
  width: 100%;
  max-width: 460px;
  position: relative;
  transform: rotate(-0.5deg);
}

.modal-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--hd-ink);
}
.modal-subtitle {
  font-size: 13px;
  color: var(--hd-pencil);
  margin-bottom: 24px;
  line-height: 1.5;
}
.modal-subtitle a { color: var(--hd-blue); }

.form-group {
  margin-bottom: 16px;
}
.form-label {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  display: block;
  margin-bottom: 6px;
  color: var(--hd-ink);
}
.form-input {
  width: 100%;
  padding: 12px 14px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--hd-ink);
  background: white;
  border: 2px solid var(--hd-ink);
  border-radius: 14px 10px 12px 16px / 10px 14px 16px 12px;
  outline: none;
  box-shadow: 2px 2px 0 rgba(45,42,38,0.12);
}
.form-input:focus {
  border-color: var(--hd-blue);
  box-shadow: 3px 3px 0 var(--hd-blue);
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 24px;
  justify-content: flex-end;
}

.btn-outline {
  background: none;
  border: 2px solid var(--hd-ink);
  padding: 10px 18px;
  border-radius: 14px 10px 12px 16px / 10px 14px 16px 12px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  color: var(--hd-ink);
  box-shadow: 2px 2px 0 var(--hd-ink);
  transition: transform 0.1s;
}
.btn-outline:hover { transform: translateY(-1px); }

.modal-close {
  position: absolute;
  top: 12px; right: 14px;
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: var(--hd-pencil);
  line-height: 1;
}

.api-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  margin-top: 6px;
  color: var(--hd-green);
  font-family: var(--font-display);
}
.api-status.missing { color: var(--hd-red); }
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* ===== READER OVERLAY ===== */
.reader-overlay {
  position: fixed;
  inset: 0;
  background: rgba(45,42,38,0.55);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.reader-overlay.visible { display: flex; }

.reader-book {
  background: #fffdf8;
  border: 2.5px solid var(--hd-ink);
  border-radius: 20px 16px 18px 22px / 16px 20px 22px 18px;
  box-shadow: 10px 10px 0 rgba(45,42,38,0.3);
  width: 100%;
  max-width: 680px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

@media (max-width: 639px) {
  .reader-overlay { padding: 0; }
  .reader-book {
    max-width: 100%;
    max-height: 100%;
    height: 100dvh;
    border-radius: 0;
    border: none;
    box-shadow: none;
  }
}

.reader-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 2px dashed rgba(45,42,38,0.15);
  flex-shrink: 0;
}

.reader-source-link {
  font-size: 11px;
  color: var(--hd-pencil);
  font-family: var(--font-body);
  text-decoration: none;
  max-width: 70%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  opacity: 0.7;
}
.reader-source-link:hover { opacity: 1; color: var(--hd-blue); }

.reader-close {
  background: none;
  border: 2px solid var(--hd-ink);
  border-radius: 50%;
  width: 32px; height: 32px;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
  color: var(--hd-ink);
  transition: background 0.15s;
  flex-shrink: 0;
}
.reader-close:hover { background: #fde8e6; border-color: var(--hd-red); color: var(--hd-red); }

.reader-delete-btn {
  background: none;
  border: none;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--hd-red);
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 6px;
  transition: background 0.15s;
  flex-shrink: 0;
}
.reader-delete-btn:hover { background: #fde8e6; }

/* page content area */
.reader-page {
  flex: 1;
  overflow-y: auto;
  padding: 32px 36px;
  position: relative;
}

@media (max-width: 639px) {
  .reader-page { padding: 24px 20px; }
}

/* cover page */
.page-cover {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 20px;
  min-height: 100%;
}

.cover-thumb {
  width: 100%;
  max-width: 380px;
  aspect-ratio: 16/9;
  object-fit: cover;
  border-radius: 12px 8px 10px 14px / 8px 12px 14px 10px;
  border: 2px solid rgba(45,42,38,0.15);
}
.cover-thumb-placeholder {
  width: 120px; height: 120px;
  border-radius: 50% 45% 55% 42% / 45% 55% 42% 55%;
  background: var(--hd-yellow);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
  border: 2px solid rgba(45,42,38,0.15);
}

.cover-type-tag {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--hd-pencil);
  background: var(--hd-yellow);
  padding: 3px 10px;
  border-radius: 20px;
  border: 1.5px solid rgba(45,42,38,0.15);
}

.cover-title {
  font-family: var(--font-display);
  font-size: clamp(18px, 3.5vw, 26px);
  font-weight: 700;
  color: var(--hd-ink);
  line-height: 1.3;
  max-width: 480px;
}

.cover-date {
  font-family: var(--font-display);
  font-size: 13px;
  color: var(--hd-pencil);
  font-style: italic;
}

.cover-wave {
  width: 60px;
  height: 8px;
  border-bottom: 3px solid var(--hd-red);
  border-radius: 0 0 50% 50%;
  margin: 4px auto;
}

/* content page */
.page-content {}

.page-chapter-num {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--hd-pencil);
  margin-bottom: 8px;
  opacity: 0.7;
}

.page-title {
  font-family: var(--font-display);
  font-size: clamp(18px, 3vw, 24px);
  font-weight: 700;
  color: var(--hd-ink);
  line-height: 1.25;
  margin-bottom: 20px;
  position: relative;
  display: inline-block;
}
.page-title::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0;
  width: 100%;
  height: 3px;
  background: var(--hd-yellow);
  border-radius: 2px;
  opacity: 0.8;
}

.page-body {
  font-size: 16px;
  line-height: 1.8;
  color: var(--hd-ink);
  font-family: var(--font-body);
  margin-top: 16px;
}

/* hand-drawn section divider */
.page-divider {
  margin: 24px 0;
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0.3;
}
.page-divider::before, .page-divider::after {
  content: '';
  flex: 1;
  height: 2px;
  background: var(--hd-ink);
  border-radius: 2px;
}
.page-divider-star { font-size: 12px; }

/* ===== READER SELECTION BAR ===== */
.reader-sel-bar {
  display: none;
  padding: 10px 18px;
  background: rgba(247,200,75,0.28);
  border-top: 1.5px dashed rgba(45,42,38,0.18);
  justify-content: center;
  flex-shrink: 0;
}
.reader-sel-bar.visible { display: flex; }
#sel-highlight-btn {
  background: var(--hd-yellow);
  border: 2px solid var(--hd-ink);
  border-radius: 22px;
  padding: 8px 20px;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 3px 3px 0 var(--hd-ink);
  color: var(--hd-ink);

<script>
// ===== FIREBASE INIT =====
const firebaseConfig = {
  apiKey: "AIzaSyAkfXRNup3Rn_O7qooXWX3wAD4VLKOsI3M",

};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

// ===== FIRESTORE HELPERS =====
function userCol(name) {
  return db.collection('users').doc(currentUser.uid).collection(name);
}
async function fsPush(col, id, data) {
  if (!currentUser) return;
  userCol(col).doc(id).set(data).catch(e => console.warn('fs write', e));
}
async function fsRemove(col, id) {
  if (!currentUser) return;
  userCol(col).doc(id).delete().catch(e => console.warn('fs delete', e));
}
async function fsGetAll(col, orderField) {
  let q = userCol(col);
  if (orderField) q = q.orderBy(orderField, 'desc');
  const snap = await q.get();
  return snap.docs.map(d => d.data());
}

async function pullFromFirestore() {
  try {
    // Items
    const fsItems = await fsGetAll('items', 'dateAdded');
    const local = loadItems();
    const fsIds = new Set(fsItems.map(i => i.id));
    const onlyLocal = local.filter(i => !fsIds.has(i.id));
    const merged = [...fsItems, ...onlyLocal].sort((a,b) => new Date(b.dateAdded)-new Date(a.dateAdded));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
    for (const item of onlyLocal) fsPush('items', item.id, item);

    // Progress
    const progSnap = await userCol('progress').get();
    const fsProgress = {};
    progSnap.docs.forEach(d => { fsProgress[d.id] = d.data(); });
    const localProg = getProgressData();
    localStorage.setItem(PROGRESS_STORAGE, JSON.stringify({ ...localProg, ...fsProgress }));

    // Highlights
    const fsHL = await fsGetAll('highlights', 'dateAdded');
    const localHL = getHighlights();
    const fsHIds = new Set(fsHL.map(h => h.id));
    const onlyLocalHL = localHL.filter(h => !fsHIds.has(h.id));
    const mergedHL = [...fsHL, ...onlyLocalHL].sort((a,b) => new Date(b.dateAdded)-new Date(a.dateAdded));
    localStorage.setItem(HIGHLIGHTS_STORAGE, JSON.stringify(mergedHL));
    for (const h of onlyLocalHL) fsPush('highlights', h.id, h);

    // Settings (Gemini key + model)
    const settingsDoc = await db.collection('users').doc(currentUser.uid)
      .collection('settings').doc('main').get();
    if (settingsDoc.exists) {
      const s = settingsDoc.data();
      if (s.geminiKey) localStorage.setItem(API_KEY_STORAGE, s.geminiKey);
      if (s.model) localStorage.setItem(MODEL_STORAGE, s.model);
    }
  } catch(e) { console.warn('Firestore pull failed:', e); }
}

function fsSaveSettings() {

  db.collection('users').doc(currentUser.uid).collection('settings').doc('main').set({
    geminiKey: getApiKey(),
    model: getModel(),
  }, { merge: true }).catch(() => {});
}

function parseYouTubeId(url) {
  const patterns = [
    /[?&]v=([a-zA-Z0-9_-]{11})/,
    /youtu\.be\/([a-zA-Z0-9_-]{11})/,
    /shorts\/([a-zA-Z0-9_-]{11})/,

  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

// ===== YOUTUBE META =====
async function fetchYouTubeMeta(videoId) {
  try {
    const oEmbedUrl = `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`;
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(oEmbedUrl)}`);
    const data = await res.json();
    const json = JSON.parse(data.contents);
    return {
      title: json.title || '',
      thumbnail: `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`,
    };
  } catch {
    return {
      title: '',
      thumbnail: `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`,
    };
  }
}

// ===== GEMINI API =====
async function callGemini(parts, retryOnLimit = true) {
  const key = getApiKey();
  if (!key) throw new Error('請先在設定中輸入 Gemini API Key');

  const model = getModel();
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
  const body = {
    contents: [{ parts }],
    generationConfig: { temperature: 0.4, maxOutputTokens: 8192 }
  };

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const msg = err?.error?.message || `HTTP ${res.status}`;

    if (res.status === 404) {
      throw new Error(`模型「${model}」不存在或你的 API Key 無法使用此模型。請到設定改選其他模型。\n\n原始訊息：${msg}`);
    }
    if (res.status === 403) {
      throw new Error(`API Key 無效或無存取權限。請確認 Key 正確，並在 Google AI Studio 確認已啟用 API。\n\n原始訊息：${msg}`);
    }
    if (res.status === 429) {
      if (retryOnLimit) {
        setLoading('達到速率限制，15 秒後自動重試...');
        await new Promise(r => setTimeout(r, 15000));
        return callGemini(parts, false);
      }
      throw new Error(`API 速率限制（RPM 超過）。免費方案每分鐘有次數限制，請等一分鐘後再試，或到設定改用其他模型。\n\n原始訊息：${msg}`);
    }
    if (res.status === 503 || res.status === 500 || msg.toLowerCase().includes('high demand') || msg.toLowerCase().includes('overloaded')) {
      if (retryOnLimit) {
        setLoading('Gemini 伺服器忙碌，20 秒後自動重試...');
        await new Promise(r => setTimeout(r, 20000));
        return callGemini(parts, false);
      }
      throw new Error(`Gemini 伺服器目前流量過高，請稍後再試，或到設定換用其他模型。\n\n原始訊息：${msg}`);
    }
    throw new Error(`Gemini API 錯誤：${msg}`);
  }

  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
  return text;
}

function parseGeminiJson(raw) {
  // strip possible markdown code fences
  let cleaned = raw.trim();
  cleaned = cleaned.replace(/^```json\s*/i, '').replace(/```\s*$/, '');
  cleaned = cleaned.replace(/^```\s*/i, '').replace(/```\s*$/, '');
  return JSON.parse(cleaned);
}

// ===== ARTICLE PROMPT =====
function buildArticlePrompt(text) {

${text.slice(0, 12000)}

請完成以下工作：
1. 辨識文章語言，若非繁體中文，翻譯成繁體中文（台灣語氣，使用台灣慣用詞彙）
2. 整理成 4～6 個段落摘要，每段有一個標題 + 120～250 字正文
3. 在每段正文中，若有特別重要、值得記憶的關鍵句子，請用 [[句子]] 格式標記（每段最多 2 句），例如：「普通文字 [[這是重要句子]] 繼續普通文字。」
4. 只回傳下列 JSON 格式，不加任何 markdown 包裝或多餘說明：
{"title":"文章摘要標題","pages":[{"title":"段落標題","content":"段落正文（含[[標記]]）"},...]}`;

// ===== PROCESS YOUTUBE =====
async function processYouTube(url, videoId) {
  setLoading('正在讀取影片資訊...');
  const meta = await fetchYouTubeMeta(videoId);

  setLoading('AI 正在分析影片內容（可能需要 30～60 秒）...');

  // Try direct YouTube URL first
  let raw = '';
  let usedFallback = false;
  try {
    raw = await callGemini([
      { file_data: { mime_type: 'video/mp4', file_uri: `https://www.youtube.com/watch?v=${videoId}` } },
      { text: YOUTUBE_PROMPT }
    ]);
  } catch (e) {
    // If direct video fails, try fetching subtitles as fallback
    if (e.message && (e.message.includes('400') || e.message.includes('無效') || e.message.includes('unsupported'))) {
      usedFallback = true;
    } else {
      throw e;
    }
  }

  // Fallback: fetch subtitles and send as text
  if (usedFallback || !raw) {
    setLoading('嘗試抓取影片字幕...');
    const subtitleText = await fetchYouTubeSubtitles(videoId);
    if (subtitleText) {
      setLoading('AI 正在分析字幕內容...');
      raw = await callGemini([{ text: buildArticlePrompt(subtitleText) }]);
    } else {
      throw new Error('無法取得影片內容。請確認影片是否公開，或影片是否有字幕。你也可以嘗試直接貼上影片文字稿。');
    }
  }

  const parsed = parseGeminiJson(raw);
  return {
    id: generateId(),
    url,
    type: 'youtube',
    title: parsed.title || meta.title || '無標題影片',
    thumbnail: meta.thumbnail,
    dateAdded: new Date().toISOString(),
    pages: parsed.pages || [],
  };
}

// ===== FETCH YOUTUBE SUBTITLES (FALLBACK) =====
async function fetchYouTubeSubtitles(videoId) {
  const langs = ['zh-TW', 'zh', 'en', 'a.zh', 'a.en'];
  for (const lang of langs) {
    try {
      const timedTextUrl = `https://www.youtube.com/api/timedtext?v=${videoId}&lang=${lang}&fmt=json3`;
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(timedTextUrl)}`;
      const res = await fetch(proxyUrl);
      const data = await res.json();
      if (!data.contents || data.contents.length < 50) continue;
      // Try parsing as json3
      try {
        const json = JSON.parse(data.contents);
        if (json.events) {
          const text = json.events
            .filter(e => e.segs)
            .map(e => e.segs.map(s => s.utf8 || '').join(''))
            .join(' ')
            .replace(/\s+/g, ' ')
            .trim();
          if (text.length > 100) return text;
        }
      } catch {
        // maybe XML format
        const text = data.contents.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
        if (text.length > 100) return text;
      }
    } catch { continue; }
  }
  return '';
}

// ===== PROCESS ARTICLE =====
async function processArticle(url) {
  setLoading('正在抓取文章內容...');
  const articleText = await fetchArticleText(url);
  if (!articleText || articleText.length < 100) {
    throw new Error('無法取得文章內容。可能是網站禁止抓取，請確認連結是否正確。');
  }
  setLoading('AI 正在摘要文章（可能需要 20～40 秒）...');
  const raw = await callGemini([{ text: buildArticlePrompt(articleText) }]);
  const parsed = parseGeminiJson(raw);
  return {
    id: generateId(),
    url,
    type: 'article',
    title: parsed.title || '無標題文章',
    thumbnail: '',
    dateAdded: new Date().toISOString(),
    pages: parsed.pages || [],
  };
}

// ===== FETCH ARTICLE TEXT =====
function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(t));
}

async function fetchArticleText(url) {
  let html = '';

  // 1. Direct fetch (fast, works for CORS-friendly sites)
  try {
    const res = await fetchWithTimeout(url, 8000);
    if (res.ok) html = await res.text();
  } catch { /* try proxy */ }

  // 2. Primary CORS proxy
  if (!html) {
    try {
      const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
      const res = await fetchWithTimeout(proxy, 30000);
      const data = await res.json();
      html = data.contents || '';
    } catch(e) {
      if (e.name === 'AbortError') {
        throw new Error('文章抓取逾時（超過 30 秒）。請確認網址是否正確，或該網站可能封鎖了外部讀取。');
      }
    }
  }

  // 3. Backup proxy
  if (!html) {
    try {
      const backup = `https://corsproxy.io/?${encodeURIComponent(url)}`;
      const res = await fetchWithTimeout(backup, 25000);
      if (res.ok) html = await res.text();
    } catch { /* give up */ }
  }

  if (!html) throw new Error('無法取得文章內容。可能是網站封鎖了外部讀取，請嘗試其他連結。');
  return extractTextFromHtml(html);
}

function extractTextFromHtml(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Remove unwanted elements
  ['script','style','nav','header','footer','aside','iframe',
   'noscript','form','button','input','select','[role="navigation"]',
   '[role="banner"]','[role="complementary"]'].forEach(sel => {
    try { doc.querySelectorAll(sel).forEach(el => el.remove()); } catch {}
  });

  // Prefer article/main content
  const main = doc.querySelector('article, main, [role="main"], .post-content, .article-body, .entry-content, .content');
  const target = main || doc.body;
  const text = target ? target.innerText || target.textContent : '';
  return text.replace(/\s+/g, ' ').trim();
}

// ===== MAIN SUBMIT HANDLER =====
async function handleSubmit() {
  hideError();
  const url = document.getElementById('url-input').value.trim();
  if (!url) { showError('請貼上 YouTube 網址或文章 URL'); return; }
  if (!url.startsWith('http')) { showError('請輸入完整網址（以 http 或 https 開頭）'); return; }
  if (!getApiKey()) {
    showError('請先點右上角齒輪設定 Gemini API Key');
    return;
  }

  try {
    let item;
    const videoId = parseYouTubeId(url);
    if (videoId) {
      item = await processYouTube(url, videoId);
    } else {
      item = await processArticle(url);
    }

    const items = loadItems();
    items.unshift(item);
    saveItems(items);
    fsPush('items', item.id, item);
    renderCards();
    document.getElementById('url-input').value = '';
    clearLoading();
  } catch (e) {
    clearLoading();
    showError(e.message || '處理失敗，請稍後再試');
  }
}

// ===== RENDER CARDS =====
function renderCards() {
  const items = loadItems();
  const grid = document.getElementById('cards-grid');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('card-count');

  count.textContent = items.length ? `${items.length} 張` : '';

  if (!items.length) {
    empty.style.display = 'block';
    grid.innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = items.map((item, i) => {
    const color = CARD_COLORS[i % CARD_COLORS.length];
    const dateStr = formatDate(item.dateAdded);
    const pageCount = item.pages?.length || 0;
    const typeLabel = item.type === 'youtube' ? '▶ YouTube' : '📄 文章';
    const thumbHtml = item.thumbnail
      ? `<img class="card-thumb" src="${escHtml(item.thumbnail)}" alt="" onerror="this.style.display='none'">`
      : item.type === 'article'
        ? `<img class="card-thumb" src="文章封面圖.png" alt="文章">`
        : `<div class="card-thumb-placeholder">▶</div>`;

    const prog = getItemProgress(item.id);
    const pl = PROGRESS_LABEL[prog.status];
    return `<div class="card ${color}" data-id="${item.id}" role="button" tabindex="0" aria-label="開啟 ${escHtml(item.title)}">
  ${thumbHtml}
  <div class="card-body">
    <div class="card-type-badge">${typeLabel}</div>
    <div class="card-title">${escHtml(item.title)}</div>
    <span class="progress-badge ${pl.cls}">${pl.icon} ${pl.text}</span>
    <div class="card-meta">
      <span>${dateStr}</span>
      <span class="card-pages-badge">${pageCount} 頁</span>
    </div>
  </div>
</div>`;
  }).join('');

  // attach click handlers
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      const item = loadItems().find(it => it.id === id);
      if (item) openReader(item);
    });
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') card.click();
    });
  });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function deleteCard(id, e) {
  e.stopPropagation();
  if (!confirm('確定刪除這張卡片？')) return;
  const items = loadItems().filter(it => it.id !== id);
  saveItems(items);
  fsRemove('items', id);
  renderCards();
}

// ===== READER =====
function openReader(item) {
  readerItem = item;
  // restore last page
  const prog = getItemProgress(item.id);
  readerPage = prog.lastPage || 0;
  // mark as reading (if not already completed)
  if (prog.status !== 'completed') {
    setItemProgress(item.id, 'reading', readerPage);
  }
  buildProgressDots();
  renderReaderPage();
  document.getElementById('reader-source-link').href = item.url;
  document.getElementById('reader-source-link').textContent = item.url;
  document.getElementById('reader-overlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function closeReader() {
  document.getElementById('reader-overlay').classList.remove('visible');
  document.body.style.overflow = '';
  readerItem = null;
}

function buildProgressDots() {
  if (!readerItem) return;
  const total = (readerItem.pages?.length || 0) + 1; // +1 for cover
  const dotsEl = document.getElementById('progress-dots');
  dotsEl.innerHTML = Array.from({ length: total }, (_, i) =>
    `<div class="progress-dot ${i === 0 ? 'active' : ''}" data-page="${i}" title="${i === 0 ? '封面' : `第 ${i} 頁`}"></div>`
  ).join('');
  dotsEl.querySelectorAll('.progress-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      readerPage = parseInt(dot.dataset.page);
      renderReaderPage();
    });
  });
}

function renderReaderPage() {
  if (!readerItem) return;
  const pages = readerItem.pages || [];
  const total = pages.length + 1;
  const pageEl = document.getElementById('reader-page');

  if (readerPage === 0) {
    // Cover page
    const thumbHtml = readerItem.thumbnail
      ? `<img class="cover-thumb" src="${escHtml(readerItem.thumbnail)}" alt="" onerror="this.style.display='none'">`
      : readerItem.type === 'article'
        ? `<img class="cover-thumb" src="文章封面圖.png" alt="文章">`
        : `<div class="cover-thumb-placeholder">▶</div>`;
    const typeLabel = readerItem.type === 'youtube' ? 'YouTube 影片' : '網路文章';

    pageEl.innerHTML = `<div class="page-cover">
  ${thumbHtml}
  <span class="cover-type-tag">${typeLabel}</span>
  <div class="cover-wave"></div>
  <div class="cover-title">${escHtml(readerItem.title)}</div>
  <div class="cover-date">📅 ${formatDate(readerItem.dateAdded)} · 共 ${pages.length} 頁摘要</div>
</div>`;
    document.getElementById('page-label').textContent = '封面';
  } else {
    // Content page
    const idx = readerPage - 1;
    const page = pages[idx];
    if (!page) return;
    // apply highlights to body text
    const bodyHtml = applyHighlightsToText(
      parseKeySentences(escHtml(page.content).replace(/\n/g, '<br>')),
      getHighlights().filter(h => h.itemId === readerItem.id && h.pageIndex === idx)
    );
    pageEl.innerHTML = `<div class="page-content">
  <div class="page-chapter-num">第 ${readerPage} 頁 / 共 ${pages.length} 頁</div>
  <div class="page-title">${escHtml(page.title)}</div>
  <div class="page-divider"><span class="page-divider-star">✦</span></div>
  <div class="page-body">${bodyHtml}</div>
</div>`;
    document.getElementById('page-label').textContent = `第 ${readerPage} 頁 / 共 ${pages.length} 頁`;

    // bind highlight remove clicks
    pageEl.querySelectorAll('mark.reader-highlight').forEach(mark => {
      mark.addEventListener('click', e => {
        e.stopPropagation();
        const hid = mark.dataset.hid;
        if (hid && confirm('移除這個螢光筆標記？')) {
          deleteHighlight(hid);
          renderReaderPage();
          updateCollectionBadge();
        }
      });
    });
  }

  // track progress
  if (readerItem) {
    const isLastPage = readerPage === total - 1;
    const newStatus = isLastPage ? 'completed' : 'reading';
    setItemProgress(readerItem.id, newStatus, readerPage);
    renderCards(); // refresh badge on card
  }

  // update nav buttons
  document.getElementById('nav-prev').disabled = readerPage === 0;
  document.getElementById('nav-next').disabled = readerPage === total - 1;

  // update dots
  document.querySelectorAll('.progress-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === readerPage);
  });

  // scroll to top
  pageEl.scrollTop = 0;
  hideHighlightPopup();
}

// ===== KEY SENTENCE PARSER =====
function parseKeySentences(escapedHtml) {
  return escapedHtml.replace(/\[\[(.+?)\]\]/g, '<span class="key-sentence">$1</span>');
}

// ===== HIGHLIGHT HELPERS =====
function applyHighlightsToText(escapedHtml, highlights) {
  let result = escapedHtml;
  highlights.forEach(h => {
    const escapedText = escHtml(h.text);
    // escape regex special chars
    const pattern = escapedText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(pattern, 'g');
    result = result.replace(regex,
      `<mark class="reader-highlight" data-hid="${h.id}">${escapedText}</mark>`);
  });
  return result;
}

// ===== FLOATING HIGHLIGHT BUTTON =====
let pendingHighlightText = '';

function showHighlightPopup(x, y, text) {
  pendingHighlightText = text;
  const btn = document.getElementById('highlight-popup');
  btn.style.left = `${x}px`;
  btn.style.top  = `${y - 44}px`;
  btn.classList.add('visible');
}
function hideHighlightPopup() {
  document.getElementById('highlight-popup').classList.remove('visible');
  document.getElementById('reader-sel-bar')?.classList.remove('visible');
  pendingHighlightText = '';
}

// unified selection handler via selectionchange (works on both desktop & mobile)
let selChangeTimer = null;
document.addEventListener('selectionchange', () => {
  clearTimeout(selChangeTimer);
  selChangeTimer = setTimeout(() => {
    if (!readerItem || readerPage === 0) return;
    const sel = window.getSelection();
    const text = sel?.toString().trim() || '';
    const pageBody = document.querySelector('.page-body');
    const inBody = pageBody && sel && sel.rangeCount > 0
      && pageBody.contains(sel.getRangeAt(0).commonAncestorContainer);
    const bar = document.getElementById('reader-sel-bar');

    if (text.length >= 2 && inBody) {
      pendingHighlightText = text;
      bar.classList.add('visible');
      // desktop: also show floating popup near selection
      if (!('ontouchstart' in window)) {
        const rect = sel.getRangeAt(0).getBoundingClientRect();
        showHighlightPopup(rect.left + rect.width / 2, rect.top, text);
      }
    } else {
      // small delay so tapping the bar button still works
      setTimeout(() => {
        const s2 = window.getSelection();
        if (!s2 || s2.isCollapsed) {
          bar.classList.remove('visible');
          hideHighlightPopup();
          pendingHighlightText = '';
        }
      }, 300);
    }
  }, 50);
});

function doHighlight() {
  if (!pendingHighlightText || !readerItem || readerPage === 0) return;
  const pages = readerItem.pages || [];
  const pageIndex = readerPage - 1;
  const pageTitle = pages[pageIndex]?.title || '';
  addHighlight(readerItem.id, readerItem.title, pageIndex, pageTitle, pendingHighlightText);
  window.getSelection()?.removeAllRanges();
  document.getElementById('reader-sel-bar').classList.remove('visible');
  hideHighlightPopup();
  pendingHighlightText = '';
  renderReaderPage();
  updateCollectionBadge();
  if (document.getElementById('collection-overlay').classList.contains('visible')) {
    renderCollectionPanel();
  }
}

// on mobile: touchstart fires before selection is cleared, save text here
document.getElementById('sel-highlight-btn').addEventListener('touchstart', e => {
  const sel = window.getSelection();
  if (sel && !sel.isCollapsed) pendingHighlightText = sel.toString().trim();
}, { passive: true });
// on desktop: prevent mousedown from clearing selection
document.getElementById('sel-highlight-btn').addEventListener('mousedown', e => {
  e.preventDefault();
  e.stopPropagation(); // prevent document mousedown from clearing pendingHighlightText before click fires
});

document.getElementById('sel-highlight-btn').addEventListener('click', doHighlight);
document.getElementById('highlight-popup').addEventListener('mousedown', e => e.preventDefault());
document.getElementById('highlight-popup').addEventListener('click', doHighlight);

// hide popup on click outside (desktop)
document.addEventListener('mousedown', e => {
  if (!e.target.closest('#highlight-popup') && !e.target.closest('.page-body') && !e.target.closest('#reader-sel-bar')) {
    hideHighlightPopup();
  }
});

// ===== COLLECTION PANEL =====
function updateCollectionBadge() {
  const count = getHighlights().length;
  const badge = document.getElementById('collection-badge');
  badge.textContent = count > 99 ? '99+' : count;
  badge.classList.toggle('visible', count > 0);
}

function openCollection() {
  renderCollectionPanel();
  document.getElementById('collection-overlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}
function closeCollection() {
  document.getElementById('collection-overlay').classList.remove('visible');
  if (!document.getElementById('reader-overlay').classList.contains('visible')) {
    document.body.style.overflow = '';
  }
}

function renderCollectionPanel() {
  const highlights = getHighlights();
  const body = document.getElementById('collection-body');
  if (!highlights.length) {
    body.innerHTML = '<div class="collection-empty">還沒有標記任何句子<br>在閱讀器裡框選文字即可加入！</div>';
    return;
  }
  body.innerHTML = highlights.map(h => `
<div class="highlight-card" data-hid="${h.id}">
  <button class="highlight-del" onclick="removeHighlightFromPanel('${h.id}')">✕</button>
  <div class="highlight-quote">${escHtml(h.text)}</div>
  <div class="highlight-meta">
    ${escHtml(h.itemTitle)} · ${escHtml(h.pageTitle || `第 ${(h.pageIndex||0)+1} 頁`)}
  </div>
</div>`).join('');
}

function removeHighlightFromPanel(id) {
  deleteHighlight(id);
  renderCollectionPanel();
  updateCollectionBadge();
  // if reader is open on same page, re-render it
  if (readerItem) renderReaderPage();
}

document.getElementById('collection-open').addEventListener('click', openCollection);
document.getElementById('collection-close').addEventListener('click', closeCollection);
document.getElementById('collection-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeCollection();
});

// ===== SETTINGS MODAL =====
function openSettings() {
  const key = getApiKey();
  document.getElementById('api-key-input').value = key;
  document.getElementById('model-input').value = getModel();
  updateApiStatus(key);
  document.getElementById('settings-modal').classList.add('visible');
}
function closeSettings() {
  document.getElementById('settings-modal').classList.remove('visible');
}
function updateApiStatus(key) {
  const el = document.getElementById('api-status');
  const text = document.getElementById('api-status-text');
  if (key) {
    el.classList.remove('missing');
    text.textContent = '已設定';
  } else {
    el.classList.add('missing');
    text.textContent = '尚未設定';
  }
}

// ===== EVENT BINDINGS =====
document.getElementById('settings-open').addEventListener('click', openSettings);
document.getElementById('settings-close').addEventListener('click', closeSettings);
document.getElementById('settings-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSettings();
});

document.getElementById('api-key-save').addEventListener('click', () => {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { alert('請輸入 API Key'); return; }
  setApiKey(key);
  setModel(document.getElementById('model-input').value);
  fsSaveSettings();
  updateApiStatus(key);
  closeSettings();
});

document.getElementById('api-key-clear').addEventListener('click', () => {
  if (!confirm('確定清除 API Key？')) return;
  clearApiKey();
  document.getElementById('api-key-input').value = '';
  updateApiStatus('');
});

document.getElementById('submit-btn').addEventListener('click', handleSubmit);
document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSubmit();
});

document.getElementById('error-close').addEventListener('click', hideError);

document.getElementById('reader-close').addEventListener('click', closeReader);
document.getElementById('reader-delete-btn').addEventListener('click', () => {
  if (!readerItem) return;
  if (!confirm('確定刪除這張卡片？')) return;
  const id = readerItem.id;
  const items = loadItems().filter(it => it.id !== id);
  saveItems(items);
  fsRemove('items', id);
  closeReader();
  renderCards();
});
document.getElementById('reader-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeReader();
});

document.getElementById('nav-prev').addEventListener('click', () => {
  if (readerPage > 0) { readerPage--; renderReaderPage(); }
});
document.getElementById('nav-next').addEventListener('click', () => {
  const total = (readerItem?.pages?.length || 0) + 1;
  if (readerPage < total - 1) { readerPage++; renderReaderPage(); }
});

// keyboard navigation
document.addEventListener('keydown', e => {
  if (!readerItem) return;
  if (e.key === 'ArrowLeft') document.getElementById('nav-prev').click();
  if (e.key === 'ArrowRight') document.getElementById('nav-next').click();
  if (e.key === 'Escape') closeReader();
});

// touch swipe — only horizontal, skip if text is selected
let touchStartY = 0;
const readerBook = document.querySelector('.reader-book');
readerBook.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
readerBook.addEventListener('touchend', e => {
  // abort if user selected text (螢光筆標記)
  const sel = window.getSelection();
  if (sel && !sel.isCollapsed && sel.toString().trim().length > 0) return;

  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  // only treat as swipe if horizontal motion dominates and exceeds 55px
  if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.8) {
    if (dx < 0) document.getElementById('nav-next').click();
    else document.getElementById('nav-prev').click();
  }
}, { passive: true });

// ===== INIT =====
renderCards();
updateCollectionBadge();

// Show settings on first visit if no API key
if (!getApiKey()) {
  setTimeout(() => openSettings(), 400);
}
</script>
